<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اختبار الكاميرا</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f3f7ff;
      text-align:center;
      padding:30px;
    }
    .box{
      max-width:900px;
      margin:auto;
      background:#fff;
      border-radius:20px;
      padding:20px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
    }
    video{
      width:100%;
      max-width:700px;
      height:400px;
      background:#000;
      border-radius:16px;
      object-fit:cover;
    }
    button{
      margin-top:20px;
      padding:12px 20px;
      font-size:16px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      cursor:pointer;
    }
    #status{
      margin-top:20px;
      font-size:18px;
      color:#16325c;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>اختبار تشغيل الكاميرا</h1>
    <video id="video" autoplay playsinline muted></video>
    <br>
    <button id="startBtn">تشغيل الكاميرا</button>
    <div id="status">الحالة: لم يبدأ بعد</div>
  </div>

  <script>
    const video = document.getElementById("video");
    const status = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");

    startBtn.addEventListener("click", async () => {
      try {
        status.textContent = "الحالة: جارٍ طلب إذن الكاميرا...";
        
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;

        video.onloadedmetadata = async () => {
          try {
            await video.play();
            status.textContent = "الحالة: الكاميرا تعمل بنجاح ✅";
          } catch (e) {
            status.textContent = "خطأ في تشغيل الفيديو: " + e.message;
            console.error(e);
          }
        };
      } catch (err) {
        status.textContent = "تعذر فتح الكاميرا: " + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
