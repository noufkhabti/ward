<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اختبار التعرف على الإشارة</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f8ff;
      text-align:center;
      padding:20px;
      color:#16325c;
    }
    .box{
      max-width:900px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    video{
      width:100%;
      max-width:700px;
      border-radius:16px;
      background:black;
    }
    button{
      margin:10px;
      padding:12px 18px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
    }
    #result{
      margin-top:20px;
      font-size:28px;
      font-weight:bold;
    }
    #status{
      margin-top:10px;
      color:#666;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>اختبار التعرف على إشارة اليد</h1>
    <button id="startBtn">تشغيل الكاميرا والتعرف</button>
    <video id="video" autoplay playsinline muted></video>
    <div id="result">بانتظار الإشارة…</div>
    <div id="status">الحالة: لم يبدأ بعد</div>
  </div>

  <script type="module">
    import {
      FilesetResolver,
      GestureRecognizer
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/+esm";

    const video = document.getElementById("video");
    const result = document.getElementById("result");
    const status = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");

    let recognizer = null;
    let stream = null;
    let running = false;
    let lastVideoTime = -1;

    const gestureNames = {
      Thumb_Up: "ممتاز 👍",
      Pointing_Up: "انتباه ☝️",
      Open_Palm: "توقف ✋",
      Victory: "سلام ✌️",
      Closed_Fist: "جاهز ✊",
      ILoveYou: "أقدّرك 🤟"
    };

    async function initRecognizer() {
      status.textContent = "الحالة: جارٍ تحميل النموذج...";
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm"
      );

      recognizer = await GestureRecognizer.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task"
        },
        runningMode: "VIDEO",
        numHands: 1
      });

      status.textContent = "الحالة: تم تحميل النموذج بنجاح";
    }

    async function startApp() {
      try {
        startBtn.disabled = true;

        if (!recognizer) {
          await initRecognizer();
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        running = true;
        status.textContent = "الحالة: الكاميرا تعمل، ارفعي يدك أمام العدسة";
        detectLoop();
      } catch (err) {
        console.error(err);
        status.textContent = "الحالة: حدث خطأ - " + err.message;
        result.textContent = "تعذر بدء التعرف";
        startBtn.disabled = false;
      }
    }

    function detectLoop() {
      if (!running) return;

      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const recognition = recognizer.recognizeForVideo(video, performance.now());

        if (
          recognition.gestures &&
          recognition.gestures.length > 0 &&
          recognition.gestures[0].length > 0
        ) {
          const best = recognition.gestures[0][0];
          const name = best.categoryName;
          const score = Math.round((best.score || 0) * 100);

          result.textContent = gestureNames[name] || ("إشارة: " + name);
          status.textContent = "الحالة: تم التعرف بنسبة " + score + "%";
        } else {
          result.textContent = "لم يتم اكتشاف إشارة";
        }
      }

      requestAnimationFrame(detectLoop);
    }

    startBtn.addEventListener("click", startApp);
  </script>
</body>
</html>
